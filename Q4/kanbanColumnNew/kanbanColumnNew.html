<template>
    <div class="slds-box slds-theme_default slds-m-right_small" ondragover={allowDrop} ondrop={handleDrop} data-stage="New">
        <h2 class="slds-text-heading_medium">New</h2>
        <template for:each={cases} for:item="caseRecord">
            <div key={caseRecord.Id} draggable="true" ondragstart={handleDragStart} data-id={caseRecord.Id}>
                <c-kanban-card case-record={caseRecord}></c-kanban-card>
            </div>
        </template>
    </div>
</template>
