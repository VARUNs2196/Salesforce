<template>
    <div class="slds-box slds-theme_default slds-m-right_small slds-is-relative" 
         ondragover={allowDrop} 
         ondrop={handleDrop} 
         data-stage="Closed"
         style="min-height: 200px;">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Saving changes..." size="small"></lightning-spinner>
        </template>

        <h2 class="slds-text-heading_medium">Closed</h2>
        
        <template for:each={cases} for:item="caseRecord">
            <div key={caseRecord.Id} draggable="true" ondragstart={handleDragStart} data-id={caseRecord.Id}>
                <c-kanban-card case-record={caseRecord}></c-kanban-card>
            </div>
        </template>
    </div>
</template>
