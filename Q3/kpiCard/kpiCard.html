<template>
  <button
    type="button"
    class="slds-box slds-theme_default kpi-card-clickable slds-p-around_medium"
    onclick={handleCardClick}
  >
    <div
      class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
    >
      <h3 class="slds-text-heading_small slds-truncate card-text" title={title}>
        {title}
      </h3>
      <lightning-icon
        icon-name={iconName}
        size="small"
        class={iconClass}
        alternative-text={trend}
      >
      </lightning-icon>
    </div>

    <div class="slds-m-top_small slds-text-align_left">
      <p class="slds-text-heading_medium slds-font-weight_bold card-text">
        {value}
      </p>
    </div>
  </button>
</template>
