<template>
  <lightning-card title="Sales KPI Dashboard" icon-name="standard:dashboard">
    <div class="slds-p-around_medium">
      <div class="slds-m-bottom_large" style="max-width: 320px">
        <lightning-combobox
          label="Select Filter Region"
          value={selectedRegion}
          options={regionOptions}
          onchange={handleRegionChange}
        >
        </lightning-combobox>
      </div>

      <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_large">
        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-m-bottom_small"
        >
          <c-kpi-card
            card-id="openPipeline"
            title="Open Pipeline"
            value={openPipelineVal}
            trend={openPipelineTrend}
            oncardselect={handleCardSelection}
          >
          </c-kpi-card>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-m-bottom_small"
        >
          <c-kpi-card
            card-id="wonRevenue"
            title="Won Revenue"
            value={wonRevenueVal}
            trend={wonRevenueTrend}
            oncardselect={handleCardSelection}
          >
          </c-kpi-card>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-m-bottom_small"
        >
          <c-kpi-card
            card-id="avgDealSize"
            title="Average Deal Size"
            value={avgDealSizeVal}
            trend={avgDealSizeTrend}
            oncardselect={handleCardSelection}
          >
          </c-kpi-card>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-m-bottom_small"
        >
          <c-kpi-card
            card-id="winRate"
            title="Win Rate"
            value={winRateVal}
            trend={winRateTrend}
            oncardselect={handleCardSelection}
          >
          </c-kpi-card>
        </div>
      </div>

      <template lwc:if={activeCardId}>
        <div class="slds-box slds-theme_shade slds-m-top_medium">
          <h2 class="slds-text-heading_medium slds-m-bottom_small">
            Top 5 Opportunities Detail: {activeCardTitle}
          </h2>

          <p class="slds-text-body_regular">
            Context Data Parameter Ready. Active Category ID Target Is:
            <strong>{activeCardId}</strong>
          </p>
          <c-kpi-detail-panel></c-kpi-detail-panel>
        </div>
      </template>
    </div>
  </lightning-card>
  <lightning-card title="Export Opportunities">
    <div class="slds-p-around_medium">
      <lightning-button
        label="Export Top 50 Opportunities (CSV)"
        variant="brand"
        onclick={handleExport}
      >
      </lightning-button>
    </div>
  </lightning-card>
</template>
